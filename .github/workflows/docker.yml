name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-docker-image-amd64:
    name: Build Docker Image (amd64)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Set lowercase repository owner
        run: echo "REPO_OWNER_LOWERCASE=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set lowercase repository name
        run: echo "REPO_NAME_LOWERCASE=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract app version
        run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Setup Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_OWNER_LOWERCASE }}/${{ env.REPO_NAME_LOWERCASE }}
          tags: |
            type=ref,event=branch,suffix=-amd64
            type=sha,prefix={{branch}}-,suffix=-amd64
            type=raw,value=latest-amd64,enable={{is_default_branch}}

      - name: Build and push Docker image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
            GIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  build-docker-image-arm64:
    name: Build Docker Image (arm64)
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'push'

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Set lowercase repository owner
        run: echo "REPO_OWNER_LOWERCASE=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set lowercase repository name
        run: echo "REPO_NAME_LOWERCASE=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract app version
        run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Setup Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_OWNER_LOWERCASE }}/${{ env.REPO_NAME_LOWERCASE }}
          tags: |
            type=ref,event=branch,suffix=-arm64
            type=sha,prefix={{branch}}-,suffix=-arm64
            type=raw,value=latest-arm64,enable={{is_default_branch}}

      - name: Build and push Docker image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64/v8
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
            GIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  create-multiarch-manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: [build-docker-image-amd64, build-docker-image-arm64]
    if: github.event_name == 'push'

    steps:
      - name: Set lowercase repository owner
        run: echo "REPO_OWNER_LOWERCASE=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set lowercase repository name
        run: echo "REPO_NAME_LOWERCASE=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest for branch
        run: |
          docker buildx imagetools create -t ghcr.io/${{ env.REPO_OWNER_LOWERCASE }}/${{ env.REPO_NAME_LOWERCASE }}:${{ github.ref_name }} \
            ghcr.io/${{ env.REPO_OWNER_LOWERCASE }}/${{ env.REPO_NAME_LOWERCASE }}:${{ github.ref_name }}-amd64 \
            ghcr.io/${{ env.REPO_OWNER_LOWERCASE }}/${{ env.REPO_NAME_LOWERCASE }}:${{ github.ref_name }}-arm64

      - name: Create and push manifest for SHA
        run: |
          docker buildx imagetools create -t ghcr.io/${{ env.REPO_OWNER_LOWERCASE }}/${{ env.REPO_NAME_LOWERCASE }}:${{ github.ref_name }}-${{ env.SHORT_SHA }} \
            ghcr.io/${{ env.REPO_OWNER_LOWERCASE }}/${{ env.REPO_NAME_LOWERCASE }}:${{ github.ref_name }}-${{ env.SHORT_SHA }}-amd64 \
            ghcr.io/${{ env.REPO_OWNER_LOWERCASE }}/${{ env.REPO_NAME_LOWERCASE }}:${{ github.ref_name }}-${{ env.SHORT_SHA }}-arm64

      - name: Create and push manifest for latest (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          docker buildx imagetools create -t ghcr.io/${{ env.REPO_OWNER_LOWERCASE }}/${{ env.REPO_NAME_LOWERCASE }}:latest \
            ghcr.io/${{ env.REPO_OWNER_LOWERCASE }}/${{ env.REPO_NAME_LOWERCASE }}:latest-amd64 \
            ghcr.io/${{ env.REPO_OWNER_LOWERCASE }}/${{ env.REPO_NAME_LOWERCASE }}:latest-arm64
